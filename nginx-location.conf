# SoftCreatR Push Daemon nginx snippet
#
# This snippet intentionally exposes only the public health and stream endpoints.
# Do NOT proxy /api/publish or /api/stats publicly. Keep privileged endpoints
# internal and let trusted application or admin tooling call the daemon directly.
#
# Recommended:
# - bind the daemon itself to 127.0.0.1
# - keep proxy_buffering disabled for the stream endpoint
# - consider rate limiting at the reverse proxy layer
#
# Example rate limiting setup:
# These directives must be placed in the nginx `http { ... }` context, not here.
#
#   limit_req_zone  $binary_remote_addr  zone=push_daemon_req:10m   rate=10r/s;
#   limit_conn_zone $binary_remote_addr  zone=push_daemon_conn:10m;
#
# Example usage inside the stream location below:
#
#   limit_req  zone=push_daemon_req burst=20 nodelay;
#   limit_conn push_daemon_conn 10;
#
# Tune these values to your actual traffic pattern. Streams are long-lived, so
# connection limits are often more useful than aggressive request throttling.

location = /push-daemon/healthz {
    proxy_pass              http://127.0.0.1:45831/healthz;
    proxy_http_version      1.1;
    proxy_redirect          off;
    proxy_buffering         off;
    proxy_request_buffering off;
    proxy_cache             off;
    proxy_set_header        Host $host;
    proxy_set_header        X-Real-IP $remote_addr;
    proxy_set_header        X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header        X-Forwarded-Proto $scheme;
    proxy_read_timeout      15s;
    proxy_send_timeout      15s;
    send_timeout            15s;
    gzip                    off;
    add_header              X-Accel-Buffering no always;
}

location /push-daemon/api/stream/ {
    proxy_pass              http://127.0.0.1:45831/;
    proxy_http_version      1.1;
    proxy_redirect          off;
    proxy_buffering         off;
    proxy_request_buffering off;
    proxy_cache             off;
    proxy_set_header        Host $host;
    proxy_set_header        X-Real-IP $remote_addr;
    proxy_set_header        X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header        X-Forwarded-Proto $scheme;
    proxy_read_timeout      75s;
    proxy_send_timeout      75s;
    send_timeout            75s;
    gzip                    off;
    add_header              X-Accel-Buffering no always;

    # Optional, if the corresponding zones are defined in `http { ... }`:
    # limit_req              zone=push_daemon_req burst=20 nodelay;
    # limit_conn             push_daemon_conn 10;
}
